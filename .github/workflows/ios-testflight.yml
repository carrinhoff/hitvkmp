name: iOS TestFlight

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Gradle
        run: chmod +x ./gradlew

      - name: Generate app icon
        run: |
          ICON_DIR=iosApp/iosApp/Assets.xcassets/AppIcon.appiconset
          if [ ! -f "$ICON_DIR/app-icon-1024.png" ]; then
            python3 -c "
          import struct, zlib
          W = H = 1024
          row = b''
          for x in range(W):
              row += bytes([30, 144, 255, 255])
          raw = b''
          for y in range(H):
              raw += b'\x00' + row
          def chunk(ctype, data):
              c = ctype + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          with open('iosApp/iosApp/Assets.xcassets/AppIcon.appiconset/app-icon-1024.png', 'wb') as f:
              f.write(b'\x89PNG\r\n\x1a\n')
              f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', W, H, 8, 6, 0, 0, 0)))
              f.write(chunk(b'IDAT', zlib.compress(raw, 9)))
              f.write(chunk(b'IEND', b''))
          "
            echo "Generated placeholder app icon"
          fi

      - name: Install code signing
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=githubactions2026
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          echo "" | base64 -D > $CERT_PATH
          security import $CERT_PATH -P "AxonPlay2026!" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "" | base64 -D > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH | grep -A1 UUID | grep string | sed 's/.*<string>//' | sed 's/<\/string>.*//')
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

      - name: Build Kotlin iOS framework
        run: ./gradlew :shared:umbrella:linkReleaseFrameworkIosArm64

      - name: Build & archive iOS app
        run: |
          cd iosApp
          xcodebuild archive             -project iosApp.xcodeproj             -scheme iosApp             -archivePath $RUNNER_TEMP/iosApp.xcarchive             -destination "generic/platform=iOS"             DEVELOPMENT_TEAM="5XNB9Q6229"             CODE_SIGN_STYLE="Manual"             CODE_SIGN_IDENTITY="Apple Distribution"             PROVISIONING_PROFILE_SPECIFIER="AxonStream AppStore"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>5XNB9Q6229</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>pt.hitv.app</key>
                  <string>AxonStream AppStore</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive             -archivePath $RUNNER_TEMP/iosApp.xcarchive             -exportOptionsPlist /tmp/ExportOptions.plist             -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        run: |
          IPA_FILE=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "IPA: $IPA_FILE"
          mkdir -p ~/private_keys
          echo "" | base64 -D > ~/private_keys/AuthKey_Q3RKNJDH5H.p8
          xcrun altool --upload-app --type ios --file "$IPA_FILE"             --apiKey "Q3RKNJDH5H"             --apiIssuer "7c6b2172-3e5f-4f15-bad4-ed5baea556cb"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iosApp.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
